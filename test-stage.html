<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>table-filter test stage</title>
</head>

<body>
  <h1>table-filter test stage</h1>

  <search>
    <form>
      <div>
        <label for="table-search-input">Search:</label>
      </div>
      <div>
        <input type="search" id="table-search-input" placeholder="Filter the table...">
      </div>
    </form>
  </search>

  <table id="filter-table">
    <caption>Showing <span id="visible-items-counter">5</span> items of 5.</caption>
    <thead>
      <tr>
        <th>First</th>
        <th>Second</th>
        <th>Third</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Lorem Ipsum</td>
        <td>Yes</td>
        <td>2026-01-05</td>
      </tr>
      <tr>
        <td>Consectetur adipiscing elit</td>
        <td>No</td>
        <td>2026-08-07</td>
      </tr>
      <tr>
        <td>Sed do eiusmod</td>
        <td>No</td>
        <td>2026-07-05</td>
      </tr>
      <tr>
        <td>Tempor incididunt ut labore</td>
        <td>Yes</td>
        <td>2026-04-08</td>
      </tr>
      <tr>
        <td>Tempor incididunt ut labore</td>
        <td>Yes</td>
        <td>2026-04-08</td>
      </tr>
    </tbody>
  </table>

  <script type="module">
    import { filterTable } from "./filter.js";
    const input = document.getElementById("table-search-input");
    input.addEventListener("input", e => filterTable("filter-table", e.target.value, "visible-items-counter"));
  </script>
</body>

</html>
